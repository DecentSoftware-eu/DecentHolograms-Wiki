site_name: 'DecentHolograms Wiki'
site_description: 'Wiki of the DecentHolograms plugin'
site_author: 'decentsoftware-eu contributors'
site_url: 'https://wiki.decentholograms.eu'

copyright: |
  Documentation licensed under the <a href="https://github.com/DecentSoftware-eu/DecentHolograms-Wiki/blob/main/LICENSE">GNU GPL v3.0 License</a>.

docs_dir: 'docs/'

repo_name: 'DecentHolograms'
repo_url: 'https://github.com/DecentSoftware-eu/DecentHolograms'

theme:
  name: 'materialx'
  custom_dir: 'theme'
  favicon: 'assets/images/favicons/android-chrome-512x512.png'
  logo: 'assets/images/favicons/android-chrome-512x512.png'
  icon:
    repo: 'octicons/mark-github-16'
    admonition:
      note: octicons/pencil-24
      abstract: octicons/paste-24
      info: octicons/info-24
      tip: octicons/light-bulb-24
      success: octicons/check-24
      question: octicons/question-24
      warning: octicons/alert-24
      failure: octicons/x-circle-24
      danger: octicons/zap-24
      bug: octicons/bug-24
      example: octicons/beaker-24
      quote: octicons/comment-24
  palette:
    scheme: 'slate'
    primary: 'custom'
  features:
    - 'navigation.tabs'
    - 'navigation.tabs.sticky'
    - 'navigation.footer'
    - 'navigation.indexes'
    - 'content.code.annotate'
    - 'content.code.copy'
    - 'content.tooltips'
    - 'content.tabs.link'

watch:
  - theme

validation:
  links:
    absolute_links: relative_to_docs

extra_css:
  - 'assets/stylesheets/theme.css'
  - 'assets/stylesheets/admonition.css'

extra_javascript:
  - 'assets/js/github-release.js'

plugins:
  - search
  - glightbox
  - awesome-nav
  - macros:
      module_name: macros
  - redirects:
      redirect_maps:
        # General pages redirects
        "general/setup.md": "guides/first-hologram.md"
        "general/compatability.md": "features/compatability.md"
        "general/format-and-colors/index.md": "features/line-content.md"
        "general/format-and-colors/colors.md.md": "features/line-content.md"
        "general/commands/index.md": "commands/index.md"
        "general/commands/general.md": "commands/index.md"
        "general/commands/features.md": "commands/features/index.md"
        "general/commands/hologram.md": "commands/hologram/index.md"
        "general/commands/hologram-line.md": "commands/hologram-lines/index.md"
        "general/commands/hologram-page.md": "commands/hologram-pages/index.md"
        "general/configuration/index.md": "configuration/index.md"
        "general/configuration/config.md": "configuration/config.md"
        "general/configuration/animation.md": "features/animations/custom-animations.md"
        "general/configuration/features.md": "configuration/config.md"
        "general/configuration/hologram.md": "configuration/hologram.md"
        "general/configuration/lang.md": "configuration/lang.md"
        "general/animations.md": "features/animations/index.md"
        "general/actions.md": "features/actions.md"
        "general/flags.md": "features/flags.md"
        # API Pages redirects
        "api/basic-usage/dhapi.md": "api/dhapi.md"
        "api/basic-usage/faq.md": "api/faq.md"

markdown_extensions:
  # Already included extensions
  - attr_list
  - toc:
      permalink: true
      toc_depth: 3
  - md_in_html
  - def_list
  # PyMDownX extensions
  - pymdownx.blocks.admonition:
      types:
        - note
        - abstract
        - info
        - tip
        - success
        - question
        - warning
        - failure
        - danger
        - bug
        - example
        - quote
  - pymdownx.blocks.details
  - pymdownx.blocks.tab:
      alternate_style: true
  - pymdownx.blocks.html:
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.snippets:
      base_path: 'snippets'

hooks:
  - hooks/replacer.py

not_in_nav: |
  general/index.md
  api/index.md
